version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: myapp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: sanjaya
      MYSQL_DATABASE: my_db
    ports:
      - "3307:3306"   # host 3307 → container 3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-psanjaya"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    container_name: myapp-api
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASS: sanjaya
      DB_NAME: my_db
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: